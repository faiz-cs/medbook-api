# ============================================================
#  nginx.conf — MedBook India Production Nginx Config
#  Sits in front of Node.js API and Next.js admin panel
#  AWS EC2 / ECS: nginx as reverse proxy + SSL termination
# ============================================================

user  nginx;
worker_processes  auto;
error_log  /var/log/nginx/error.log warn;
pid        /var/run/nginx.pid;

events {
    worker_connections  1024;
    use epoll;
    multi_accept on;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # ── Logging ───────────────────────────────────────────────
    log_format main '$remote_addr - $remote_user [$time_local] '
                    '"$request" $status $body_bytes_sent '
                    '"$http_referer" "$http_user_agent" '
                    'rt=$request_time urt=$upstream_response_time';

    access_log /var/log/nginx/access.log main;

    # ── Performance ───────────────────────────────────────────
    sendfile           on;
    tcp_nopush         on;
    tcp_nodelay        on;
    keepalive_timeout  65;
    types_hash_max_size 2048;
    server_tokens      off;   # Don't expose nginx version

    # ── Compression ───────────────────────────────────────────
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types
        text/plain text/css text/xml
        application/json application/javascript
        application/xml+rss application/atom+xml
        image/svg+xml;

    # ── Rate limiting zones ───────────────────────────────────
    # OTP endpoints: strict (5 req/min per IP)
    limit_req_zone $binary_remote_addr zone=otp:10m rate=5r/m;

    # API: 60 req/min per IP
    limit_req_zone $binary_remote_addr zone=api:10m rate=60r/m;

    # Admin panel: 30 req/min
    limit_req_zone $binary_remote_addr zone=admin:10m rate=30r/m;

    # ── Upstream servers ──────────────────────────────────────
    upstream medbook_api {
        server 127.0.0.1:3000;
        keepalive 32;
    }

    upstream medbook_admin {
        server 127.0.0.1:4000;
        keepalive 16;
    }

    # ── HTTP → HTTPS redirect ─────────────────────────────────
    server {
        listen 80;
        server_name api.medbook.in admin.medbook.in;

        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
        }

        location / {
            return 301 https://$host$request_uri;
        }
    }

    # ── API server (api.medbook.in) ───────────────────────────
    server {
        listen 443 ssl http2;
        server_name api.medbook.in;

        # SSL — managed by Certbot / AWS ACM
        ssl_certificate     /etc/letsencrypt/live/api.medbook.in/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/api.medbook.in/privkey.pem;
        ssl_protocols       TLSv1.2 TLSv1.3;
        ssl_ciphers         ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256;
        ssl_prefer_server_ciphers off;
        ssl_session_cache   shared:SSL:10m;
        ssl_session_timeout 1d;

        # Security headers
        add_header Strict-Transport-Security "max-age=63072000" always;
        add_header X-Frame-Options DENY;
        add_header X-Content-Type-Options nosniff;
        add_header X-XSS-Protection "1; mode=block";
        add_header Referrer-Policy "strict-origin-when-cross-origin";

        # Max body size (for file uploads)
        client_max_body_size 10M;

        # ── Health check (no rate limit) ───────────────────
        location = /health {
            proxy_pass http://medbook_api;
            access_log off;
        }

        # ── OTP endpoints (strict rate limiting) ───────────
        location ~ ^/api/v1/auth/otp {
            limit_req zone=otp burst=3 nodelay;
            limit_req_status 429;

            proxy_pass         http://medbook_api;
            proxy_http_version 1.1;
            proxy_set_header   Upgrade $http_upgrade;
            proxy_set_header   Connection 'upgrade';
            proxy_set_header   Host $host;
            proxy_set_header   X-Real-IP $remote_addr;
            proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_cache_bypass $http_upgrade;
        }

        # ── Razorpay webhook (no rate limit — Razorpay IPs) ─
        location = /api/v1/payments/webhook {
            proxy_pass         http://medbook_api;
            proxy_http_version 1.1;
            proxy_set_header   Host $host;
            proxy_set_header   X-Real-IP $remote_addr;
            proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            # Pass raw body for signature verification
            proxy_pass_request_body on;
        }

        # ── All other API routes ────────────────────────────
        location /api/ {
            limit_req zone=api burst=20 nodelay;
            limit_req_status 429;

            proxy_pass         http://medbook_api;
            proxy_http_version 1.1;
            proxy_set_header   Upgrade $http_upgrade;
            proxy_set_header   Connection 'upgrade';
            proxy_set_header   Host $host;
            proxy_set_header   X-Real-IP $remote_addr;
            proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_cache_bypass $http_upgrade;

            # Timeouts
            proxy_connect_timeout 10s;
            proxy_send_timeout    30s;
            proxy_read_timeout    30s;
        }
    }

    # ── Admin panel (admin.medbook.in) ────────────────────────
    server {
        listen 443 ssl http2;
        server_name admin.medbook.in;

        ssl_certificate     /etc/letsencrypt/live/admin.medbook.in/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/admin.medbook.in/privkey.pem;
        ssl_protocols       TLSv1.2 TLSv1.3;
        ssl_ciphers         ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256;
        ssl_prefer_server_ciphers off;

        # Security headers
        add_header Strict-Transport-Security "max-age=63072000" always;
        add_header X-Frame-Options DENY;
        add_header X-Content-Type-Options nosniff;
        add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-eval' 'unsafe-inline'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data: https://cdn.medbook.in;";

        # Restrict to office IPs in production
        # allow 203.0.113.0/24;   # Office IP range
        # deny all;

        location / {
            limit_req zone=admin burst=10 nodelay;

            proxy_pass         http://medbook_admin;
            proxy_http_version 1.1;
            proxy_set_header   Upgrade $http_upgrade;
            proxy_set_header   Connection 'upgrade';
            proxy_set_header   Host $host;
            proxy_set_header   X-Real-IP $remote_addr;
            proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
        }
    }
}
